<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form style="display: flex; flex-direction: column; gap: 10px">
        <label>
            Numero 1:
            <input type="text" id="number1">
        </label>
        <label>
            Numero 2:
            <input type="text" id="number2">
        </label>
        <label>
            Numero 3:
            <input type="text" id="number3">
        </label>
        <button onclick="oi(event)">Calcular</button>
    </form>
    <span>Result: <span id="result"></span></span>
    <!-- <script src="index.js"></script>
    <script src="atividadeFinal.js"></script> -->
</body>
<script>
const elementos = document.getElementsByTagName("input")

   function oi(event) {
    event.preventDefault()
    let soma = 0
    let media = 0
    for (let i = 0; i < elementos.length; i++) {
        soma = soma + Number(elementos[i].value)
       }
       media = soma / elementos.length
       console.log(media)
       result.innerHTML = media
   }
</script>
</html>
