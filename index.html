<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <main><div class="flex flex-row gap-5">
        <form action="" class="flex flex-row gap-2.5">
          <label for="celc">Celsius</label>
                    <input id="celc" type="number" class="border-2 border-indigo-500 rounded-2xl bg-indigo-500 p-1">
                    <h2>Fahrenheit</h2>
                    <span id="traducaoC">00</span>
                     </form>
                      <form action="" class="flex flex-row gap-2.5">
                        <label for="fahr">Fahrenheit</label>
                    <input id="fahr" type="number" class="border-2 border-indigo-500 rounded-2xl bg-indigo-500 p-1">
                    <h2>Celsius</h2>
                    <span id="traducaoF">00</span>
                    </form>
                    </div>
    </main>
    <!-- <script src="intro.js"></script> -->
    <!-- <script src="temp.js"></script> -->
    <script>function traducao() {
    const celc = Number(document.getElementById("celc").value)
    const um = (celc*9/5) + 32 
    console.log(um)
    traducaoC.innerHTML = um 
}
document.getElementById("celc").addEventListener("input", traducao)
function traducaoFar() {
    const fahr = Number(document.getElementById("fahr").value)
    const dois = (fahr-32) *5/9 
    console.log(dois)
    traducaoF.innerHTML = dois 
}
document.getElementById("fahr").addEventListener("input", traducaoFar)
    </script>
</body>

</html>
